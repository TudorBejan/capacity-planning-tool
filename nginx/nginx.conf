events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream team-service {
        server team-service:8083;
    }

    upstream planning-service {
        server planning-service:8082;
    }

    server {
        listen 80;

        # Team service routes
        location /api/teams {
            proxy_pass http://team-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/persons {
            proxy_pass http://team-service;
            proxy_set_header Host $host;
        }

        # Planning service routes
        location /api/initiatives {
            proxy_pass http://planning-service;
            proxy_set_header Host $host;
        }

        location /api/epics {
            proxy_pass http://planning-service;
            proxy_set_header Host $host;
        }

        location /api/capacity {
            proxy_pass http://planning-service;
            proxy_set_header Host $host;
        }

        # Frontend SPA
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
